<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media | Sarath Prabhav</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
 <div id="navbar-placeholder"></div>


<!-- Header -->
<section class="bg-primary text-white text-center py-5">
  <div class="container">
    <h1>Media</h1>
    <p>TV Shows, Talks, Courses & YouTube Content</p>
  </div>
</section>

<!-- Tabs -->
<div class="container py-5">

  <!-- Nav Pills -->
  <ul class="nav nav-pills justify-content-center mb-4" id="mediaTabs">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tv">TV Shows</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#talks">Talks</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#youtube">YouTube</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="pill" data-bs-target="#courses">Courses</button>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content">

    <!-- TV -->
    <div class="tab-pane fade show active" id="tv">
      <div class="row g-4">

        <div class="col-md-4">
          <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
            <img src="https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg" class="img-fluid rounded">
          </a>
          <h6 class="mt-2">Arike Aakaasam - Episode</h6>
        </div>

      </div>
    </div>

    <!-- Talks -->
    <div class="tab-pane fade" id="talks">
      <div class="row g-4">

        <div class="col-md-4">
          <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
            <img src="https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg" class="img-fluid rounded">
          </a>
          <h6 class="mt-2">Public Talk on Astronomy</h6>
        </div>

      </div>
    </div>

    <!-- YouTube -->
    <div class="tab-pane fade" id="youtube">
      <div class="row g-4">

        <div class="col-md-4">
          <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
            <img src="https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg" class="img-fluid rounded">
          </a>
          <h6 class="mt-2">Exploring the Night Sky</h6>
        </div>

      </div>
    </div>

    <!-- Courses -->
    <div class="tab-pane fade" id="courses">
      <div class="row g-4">

        <div class="col-md-4">
          <a href="https://www.youtube.com/watch?v=VIDEO_ID" target="_blank">
            <img src="https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg" class="img-fluid rounded">
          </a>
          <h6 class="mt-2">Full Astronomy Course</h6>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
  <p>© 2026 Sarath Prabhav</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  fetch("navbar.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("navbar-placeholder").innerHTML = data;
    });

</script>
</body>
</html>
