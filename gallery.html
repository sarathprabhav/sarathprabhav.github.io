<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SarathPrabhav</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <style>
    .gallery-img { cursor: pointer; transition: transform .2s ease; }
    .gallery-img:hover { transform: scale(1.02); }
    .meta { font-size: 0.9rem; color: #666; }
  </style>
</head>

<body class="gallery-page">


<!-- Navbar -->
 <div id="navbar-placeholder"></div>



<div class="container my-5">
  <!-- <h1 class="text-center mb-4">Gallery</h1> -->

  <!-- TABS (Astro default) -->
  <ul class="nav nav-tabs justify-content-center">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#astro">🌌 Astrophotography</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#photo">📷 Photography</button>
    </li>
  </ul>

  <div class="tab-content mt-4">


    <!-- ASTROPHOTOGRAPHY (DEFAULT) -->
    <div class="tab-pane fade show active" id="astro">
      <div class="row g-4" id="astroGallery">
         <!-- Images will be dynamically loaded here by JavaScript -->
      </div>
    </div>


    <!-- NORMAL PHOTOGRAPHY -->
    <div class="tab-pane fade" id="photo">
      <div class="row g-4" id ="photoGallery">
        


      </div>
    </div>

  </div>
</div>

<!-- LIGHTBOX MODAL -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-body text-center">
        <img id="lightboxImg" class="img-fluid mb-3">
        <h5 id="lightboxTitle"></h5>
        <p id="lightboxMeta"></p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

<script>
function openLightbox(img) {
  document.getElementById('lightboxImg').src = img.src;
  document.getElementById('lightboxTitle').innerText = img.dataset.title;
  document.getElementById('lightboxMeta').innerText = img.dataset.meta;

  const modal = new bootstrap.Modal(document.getElementById('lightboxModal'));
  modal.show();
}

</script>

<script>

// Dynamically load astrophotography images (can be extended to fetch from JSON or API)
document.addEventListener("DOMContentLoaded", function () {

  const imageFolder = "images/astrophotos/";

  const images = [
    { file: "Karthika.jpg", title: "Karthika", meta: "" },
    { file: "Annular.jpg", title: "Annular Eclipse", meta: "2019 December, Kannur Kerala " },
    { file: "Devasthal Milkyway.jpg", title: "Devasthal Optical Telescope Milky Way", meta: "Nainital India " },
    { file: "DSC_1056.jpg", title: "DSC 1056", meta: "" },
    { file: "DSC_3795.jpg", title: "DSC 3795", meta: "" },
    { file: "dss_orion_cloud120_starless.TIF.jpg", title: "Orion Cloud 120 Starless", meta: "" },
    { file: "eclipse2025.jpg", title: "Total Lunar Eclipse", meta: "" },
    { file: "final.jpg", title: "Final Image", meta: "" },
    { file: "final_MW_54mm.jpg", title: "Milky Way 54mm", meta: "" },
    { file: "ILMT_new milkyway.jpg", title: "ILMT New Milky Way", meta: "" },
    { file: "lemmon_insta.jpg", title: "Comet Lemmon", meta: "" },
    { file: "m42_full_logo.jpg", title: "Orion Nebula M42", meta: "" },
    { file: "MineralMoon-insta.jpg", title: "Mineral Moon", meta: "" },
    { file: "moon1.jpg", title: "Moon", meta: "" },
    { file: "mw1.jpg", title: "Milky Way Core", meta: "" },
    { file: "mway2.jpg", title: "Milky Way", meta: "" },
    { file: "Rosetta_Nebula.jpg", title: "Rosetta Nebula", meta: "" },
    { file: "StarStaX_img-01-img-60_gap_filling.jpg", title: "Star Trails Composite", meta: "" },
    { file: "sun-.jpg", title: "Sun", meta: "" }
  ];

  
  
  const container = document.getElementById("astroGallery");

  images.forEach(imgData => {
    const col = document.createElement("div");
    col.className = "col-md-4";

    col.innerHTML = `
      <img src="${imageFolder + imgData.file}" 
           class="img-fluid rounded shadow gallery-img"
           onclick="openLightbox(this)"
           data-title="${imgData.title}"
           data-meta="${imgData.meta}">
      <div class="meta">${imgData.title}</div>
    `;

    container.appendChild(col);
  });

});
</script>

<script>
// Dynamically load normal photography images (can be extended to fetch from JSON or API)
document.addEventListener("DOMContentLoaded", function () {

  const imageFolder = "images/astrophotos/";

  const images = [
    {
      file: "eclipse2025.jpg",
      title: "Total Lunar Eclipse",
      meta: "Location: Kerala, India | 70-200mm at 200mm | Single shots"
    },
    {
      file: "mw1.jpg",

      meta: "Location: Tamil Nadu | Nikon 24-120mm | Stacked"
    },
    {
      file: "moon1.jpg",
      title: "Andromeda Galaxy",
      meta: "Location: Kerala | Tracker: Star Adventurer | Exposure: 60s x 50"
    },
    {
      file: "Rosetta_Nebula.jpg",
      title: "Rosetta Nebula",
      meta: "Location: Kerala | Telescope Setup | Deep Sky Imaging"
    }
  ];

  const container = document.getElementById("photoGallery");

  images.forEach(imgData => {
    const col = document.createElement("div");

      <img src="${imageFolder + imgData.file}"

           onclick="openLightbox(this)"
           data-title="${imgData.title}"
           data-meta="${imgData.meta}">
      <div class="meta">${imgData.title}</div>
    `;

    container.appendChild(col);
  });

});
</script>


<script src="scripts.js"></script>





</body>
</html>
