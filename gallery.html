<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <title>Gallery | Sarath Prabhavu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="gallery-page">

<div id="navbar-placeholder"></div>

<!-- PAGE HERO (dark, matches navy theme) -->
<header class="page-hero">
  <div class="container">
    <p class="hero-eyebrow">Visual Work</p>
    <h1 class="page-hero-title">Gallery</h1>
    <p class="page-hero-sub">Astrophotography &amp; photography from across the sky and Earth</p>
  </div>
</header>

<div class="container my-5">

  <!-- TABS -->
  <ul class="nav nav-tabs justify-content-center mb-4">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#astro">
        <i class="bi bi-stars me-1"></i>Astrophotography
      </button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#photo">
        <i class="bi bi-camera me-1"></i>Photography
      </button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- ASTROPHOTOGRAPHY -->
    <div class="tab-pane fade show active" id="astro">
      <div class="row g-3" id="astroGallery"></div>
    </div>

    <!-- PHOTOGRAPHY -->
    <div class="tab-pane fade" id="photo">
      <div class="row g-3" id="photoGallery"></div>
    </div>

  </div>
</div>

<!-- LIGHTBOX MODAL -->
<div class="modal fade" id="lightboxModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content border-0" style="background:#060d1f;">
      <div class="modal-header border-0 pb-0">
        <button type="button" class="btn-close btn-close-white ms-auto" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center px-4 pb-4">
        <img id="lightboxImg" class="img-fluid rounded mb-3" style="max-height:70vh;object-fit:contain;">
        <h5 id="lightboxTitle" style="color:#fff;font-family:'Merriweather',serif;font-size:1.1rem;"></h5>
        <p id="lightboxMeta" style="color:rgba(255,255,255,0.55);font-size:0.85rem;"></p>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer mt-0">
  <div class="container text-center">
    <p class="footer-name">Sarath Prabhavu J.</p>
    <p class="footer-links">
      <a href="mailto:sarathprabhav@gmail.com"><i class="bi bi-envelope-fill"></i></a>
      <a href="https://github.com/sarathprabhav" target="_blank"><i class="bi bi-github"></i></a>
      <a href="SARATH_PRABHVU_CV.pdf" target="_blank"><i class="bi bi-file-earmark-person-fill"></i></a>
    </p>
    <p class="footer-copy">© 2026 Sarath Prabhavu J.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts.js"></script>

<script>
function openLightbox(img) {
  document.getElementById('lightboxImg').src = img.src;
  document.getElementById('lightboxTitle').innerText = img.dataset.title;
  document.getElementById('lightboxMeta').innerText = img.dataset.meta;
  new bootstrap.Modal(document.getElementById('lightboxModal')).show();
}

document.addEventListener("DOMContentLoaded", function () {

  const astroImages = [
    { file: "Karthika.jpg", title: "Karthika", meta: "" },
    { file: "Annular.jpg", title: "Annular Eclipse", meta: "2019 December, Kannur Kerala" },
    { file: "Devasthal Milkyway.jpg", title: "Devasthal Optical Telescope Milky Way", meta: "Nainital, India" },
    { file: "DSC_1056.jpg", title: "DSC 1056", meta: "" },
    { file: "DSC_3795.jpg", title: "DSC 3795", meta: "" },
    { file: "dss_orion_cloud120_starless.TIF.jpg", title: "Orion Cloud 120 Starless", meta: "" },
    { file: "eclipse2025.jpg", title: "Total Lunar Eclipse", meta: "" },
    { file: "final.jpg", title: "Final Image", meta: "" },
    { file: "final_MW_54mm.jpg", title: "Milky Way 54mm", meta: "" },
    { file: "ILMT_new milkyway.jpg", title: "ILMT Milky Way", meta: "" },
    { file: "lemmon_insta.jpg", title: "Comet Lemmon", meta: "" },
    { file: "m42_full_logo.jpg", title: "Orion Nebula M42", meta: "" },
    { file: "MineralMoon-insta.jpg", title: "Mineral Moon", meta: "" },
    { file: "moon1.jpg", title: "Moon", meta: "" },
    { file: "mw1.jpg", title: "Milky Way Core", meta: "" },
    { file: "mway2.jpg", title: "Milky Way", meta: "" },
    { file: "Rosetta_Nebula.jpg", title: "Rosetta Nebula", meta: "" },
    { file: "StarStaX_img-01-img-60_gap_filling.jpg", title: "Star Trails Composite", meta: "" },
    { file: "sun-.jpg", title: "Sun", meta: "" }
  ];

  const photoImages = [
    { file: "eclipse2025.jpg", title: "Total Lunar Eclipse", meta: "Location: Kerala, India | 70-200mm at 200mm" },
    { file: "mw1.jpg", title: "Milky Way Core", meta: "Location: Tamil Nadu | Nikon 24-120mm | Stacked" },
    { file: "moon1.jpg", title: "Andromeda Galaxy", meta: "Location: Kerala | Tracker: Star Adventurer | 60s x 50" },
    { file: "Rosetta_Nebula.jpg", title: "Rosetta Nebula", meta: "Location: Kerala | Telescope Setup | Deep Sky" }
  ];

  function buildGallery(images, containerId, folder) {
    const container = document.getElementById(containerId);
    images.forEach(imgData => {
      const col = document.createElement("div");
      col.className = "col-6 col-md-4 col-lg-3";
      col.innerHTML = `
        <div style="border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);">
          <img src="${folder + imgData.file}"
               class="img-fluid gallery-img"
               style="width:100%;aspect-ratio:4/3;object-fit:cover;"
               onclick="openLightbox(this)"
               data-title="${imgData.title}"
               data-meta="${imgData.meta}"
               loading="lazy">
          <div class="meta px-2 py-1">${imgData.title}</div>
        </div>
      `;
      container.appendChild(col);
    });
  }

  buildGallery(astroImages, 'astroGallery', 'images/astrophotos/');
  buildGallery(photoImages, 'photoGallery', 'images/astrophotos/');
});
</script>
</body>
</html>
