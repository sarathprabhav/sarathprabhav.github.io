<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gravitational Force Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }

    .formula-box {
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 1.2rem 2rem;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
      color: #ffd54f;
    }
    .formula-box .eq-label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 0.3rem;
      letter-spacing: 0;
    }

    .card-panel {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .input-group-unit select {
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 0 6px 6px 0;
      min-width: 170px;
    }
    .input-group-unit select:focus { outline: none; box-shadow: none; border-color: #ffd54f; }

    .form-control {
      background: #2a2a2a !important;
      color: #e0e0e0 !important;
      border: 1px solid #555 !important;
      border-radius: 6px 0 0 6px !important;
    }
    .form-control:focus { border-color: #ffd54f !important; box-shadow: none !important; }

    .result-box {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.5rem;
      display: none;
    }
    .result-value {
      font-size: 2rem;
      font-weight: 700;
      color: #ffd54f;
      word-break: break-all;
    }
    .result-sub { font-size: 0.88rem; color: #aaa; }

    .table-dark td, .table-dark th { vertical-align: middle; }

    .mass-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #90caf9;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .section-divider {
      border-top: 1px solid #333;
      margin: 1.2rem 0;
    }

    .btn-calc {
      background: #ffd54f;
      color: #121212;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .btn-calc:hover { background: #ffe082; }

    .comparison-badge {
      display: inline-block;
      background: #263238;
      border: 1px solid #37474f;
      border-radius: 8px;
      padding: 0.45rem 0.9rem;
      font-size: 0.82rem;
      color: #b0bec5;
      margin: 0.25rem;
    }
    .comparison-badge strong { color: #80cbc4; }

    .info-chip {
      display: inline-block;
      background: #1a237e22;
      border: 1px solid #3949ab55;
      border-radius: 20px;
      padding: 0.2rem 0.8rem;
      font-size: 0.78rem;
      color: #9fa8da;
      margin-left: 0.5rem;
    }

    footer { background: #0d0d0d; color: #777; padding: 1rem; text-align: center; margin-top: 3rem; font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="container py-5" style="max-width: 780px;">

  <h1 class="text-center mb-1" style="font-size:1.9rem; font-weight:700;">
    🌍 Gravitational Force Calculator
  </h1>
  <p class="text-center mb-4" style="color:#aaa; font-size:0.9rem;">
    Newton's Law of Universal Gravitation
  </p>

  <!-- Formula Display -->
  <div class="formula-box mb-4">
    <div>
      <span style="font-style:italic;">F</span>
      &nbsp;=&nbsp;
      <span style="font-style:italic; color:#80cbc4;">G</span>
      &nbsp;·&nbsp;
      <span style="font-style:italic; color:#ef9a9a;">M</span>
      &nbsp;·&nbsp;
      <span style="font-style:italic; color:#a5d6a7;">m</span>
      &nbsp;/&nbsp;
      <span style="font-style:italic; color:#ce93d8;">r</span><sup>2</sup>
    </div>
    <div class="eq-label">
      G = 6.674 × 10⁻¹¹ N·m²·kg⁻²
    </div>
  </div>

  <!-- Inputs -->
  <div class="card-panel mb-3">

    <!-- M1 -->
    <div class="mass-label">
      <span style="color:#ef9a9a;">M</span> — First Mass
    </div>
    <div class="input-group mb-3 input-group-unit">
      <input type="number" id="m1" class="form-control" placeholder="e.g. 1.989" min="0" step="any">
      <select id="m1Unit">
        <option value="kg">Kilogram (kg)</option>
        <option value="g">Gram (g)</option>
        <option value="earth">Earth Mass (M⊕)</option>
        <option value="moon">Moon Mass (M☽)</option>
        <option value="jupiter">Jupiter Mass (M♃)</option>
        <option value="solar" selected>Solar Mass (M☉)</option>
      </select>
    </div>

    <div class="section-divider"></div>

    <!-- M2 -->
    <div class="mass-label">
      <span style="color:#a5d6a7;">m</span> — Second Mass
    </div>
    <div class="input-group mb-3 input-group-unit">
      <input type="number" id="m2" class="form-control" placeholder="e.g. 5.972" min="0" step="any">
      <select id="m2Unit">
        <option value="kg">Kilogram (kg)</option>
        <option value="g">Gram (g)</option>
        <option value="earth" selected>Earth Mass (M⊕)</option>
        <option value="moon">Moon Mass (M☽)</option>
        <option value="jupiter">Jupiter Mass (M♃)</option>
        <option value="solar">Solar Mass (M☉)</option>
      </select>
    </div>

    <div class="section-divider"></div>

    <!-- Distance -->
    <div class="mass-label">
      <span style="color:#ce93d8;">r</span> — Separation Distance
    </div>
    <div class="input-group mb-1 input-group-unit">
      <input type="number" id="dist" class="form-control" placeholder="e.g. 1.0" min="0" step="any">
      <select id="distUnit">
        <option value="cm">Centimetre (cm)</option>
        <option value="m">Metre (m)</option>
        <option value="km">Kilometre (km)</option>
        <option value="earthR">Earth Radius (R⊕)</option>
        <option value="au" selected>Astronomical Unit (AU)</option>
        <option value="ly">Light Year (ly)</option>
        <option value="pc">Parsec (pc)</option>
      </select>
    </div>

  </div>

  <!-- Button -->
  <div class="text-center mb-4">
    <button class="btn-calc" onclick="calculate()">Calculate Force</button>
  </div>

  <!-- Result -->
  <div class="result-box" id="resultBox">

    <div class="text-center mb-3">
      <div style="font-size:0.85rem; color:#aaa; margin-bottom:0.3rem;">Gravitational Force</div>
      <div class="result-value" id="resultMain">—</div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <hr style="border-color:#333;">

    <div class="mb-2" style="font-size:0.85rem; color:#aaa;">Force in other units:</div>
    <table class="table table-dark table-sm table-bordered" style="font-size:0.88rem;">
      <thead style="background:#2a2a2a;">
        <tr>
          <th>Unit</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody id="unitTable"></tbody>
    </table>

    <hr style="border-color:#333;">

    <div class="mb-2" style="font-size:0.85rem; color:#aaa;">Context &amp; comparisons:</div>
    <div id="comparisons"></div>

  </div>

  <!-- Error -->
  <div id="errorBox" class="alert alert-danger d-none" role="alert"></div>

</div>

<footer>© 2026 Sarath Prabhavu</footer>

<script>
const G = 6.67430e-11;

const massFactors = {
  kg:      1,
  g:       1e-3,
  earth:   5.972e24,
  moon:    7.342e22,
  jupiter: 1.898e27,
  solar:   1.989e30,
};

const distFactors = {
  cm:     1e-2,
  m:      1,
  km:     1e3,
  earthR: 6.371e6,
  au:     1.496e11,
  ly:     9.461e15,
  pc:     3.086e16,
};

function toSI(val, unit, table) {
  return val * table[unit];
}

function fmt(n) {
  if (n === 0) return '0';
  const abs = Math.abs(n);
  if (abs >= 1e-3 && abs < 1e6) return n.toPrecision(5);
  return n.toExponential(4);
}

function comparisons(F) {
  const refs = [
    { label: 'Your body weight (≈70 kg person on Earth)', val: 686 },
    { label: 'Lifting a car (≈1500 kg)', val: 14715 },
    { label: 'ISS orbital thrust (≈800 N)', val: 800 },
    { label: 'Earth–Moon attraction', val: 1.98e20 },
    { label: 'Earth–Sun attraction', val: 3.54e22 },
  ];
  return refs.map(r => {
    const ratio = F / r.val;
    const ratioStr = ratio >= 1
      ? fmt(ratio) + '× stronger'
      : fmt(1 / ratio) + '× weaker';
    return `<span class="comparison-badge"><strong>${ratioStr}</strong> than ${r.label}</span>`;
  }).join('');
}

function showError(msg) {
  const eb = document.getElementById('errorBox');
  eb.textContent = msg;
  eb.classList.remove('d-none');
  document.getElementById('resultBox').style.display = 'none';
}

function clearError() {
  document.getElementById('errorBox').classList.add('d-none');
}

function calculate() {
  clearError();

  const m1Raw = parseFloat(document.getElementById('m1').value);
  const m2Raw = parseFloat(document.getElementById('m2').value);
  const dRaw  = parseFloat(document.getElementById('dist').value);

  if (isNaN(m1Raw) || m1Raw <= 0) { showError('Please enter a valid positive value for M (first mass).'); return; }
  if (isNaN(m2Raw) || m2Raw <= 0) { showError('Please enter a valid positive value for m (second mass).'); return; }
  if (isNaN(dRaw)  || dRaw  <= 0) { showError('Please enter a valid positive value for r (distance).'); return; }

  const m1 = toSI(m1Raw, document.getElementById('m1Unit').value, massFactors);
  const m2 = toSI(m2Raw, document.getElementById('m2Unit').value, massFactors);
  const r  = toSI(dRaw,  document.getElementById('distUnit').value, distFactors);

  const F = (G * m1 * m2) / (r * r);

  // Primary result
  document.getElementById('resultMain').textContent = fmt(F) + ' N';
  document.getElementById('resultSub').textContent =
    `F = G × ${fmt(m1)} kg × ${fmt(m2)} kg / (${fmt(r)} m)²`;

  // Unit table
  const rows = [
    ['Newton (N)',            F],
    ['Kilonewton (kN)',       F / 1e3],
    ['Meganewton (MN)',       F / 1e6],
    ['Dyne (CGS)',            F * 1e5],
    ['Pound-force (lbf)',     F / 4.44822],
    ['Kilogram-force (kgf)',  F / 9.80665],
  ];
  document.getElementById('unitTable').innerHTML = rows.map(([name, val]) =>
    `<tr><td>${name}</td><td style="font-family:monospace;">${fmt(val)}</td></tr>`
  ).join('');

  // Comparisons
  document.getElementById('comparisons').innerHTML = comparisons(F);

  document.getElementById('resultBox').style.display = 'block';
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') calculate();
});
</script>

</body>
</html>
