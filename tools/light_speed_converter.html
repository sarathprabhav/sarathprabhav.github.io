<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Light Speed Distance Converter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container py-5">
  <h1 class="text-center mb-4">⚡ Light Speed Converter</h1>

  <div class="card bg-secondary p-4">
    
    <!-- Input distance -->
    <div class="mb-3">
      <label class="form-label">Enter Distance:</label>
      <input type="number" id="distanceInput" class="form-control" placeholder="e.g. 25">
    </div>

    <!-- Unit selection -->
    <div class="mb-3">
      <label class="form-label">Unit:</label>
      <select id="unitSelect" class="form-select">
        <option value="cm">Centimeter (cm)</option>
        <option value="m">Meter (m)</option>
        <option value="km" selected>Kilometer (km)</option>
        <option value="au">Astronomical Unit (AU)</option>
      </select>
    </div>

    <!-- Button -->
    <button class="btn btn-warning w-100" onclick="convertLightSpeed()">
      Convert
    </button>
  </div>

  <!-- Results -->
  <div class="mt-5">
    <h3>Equivalent Light Travel Time</h3>
    <table class="table table-dark table-striped mt-3">
      <thead>
        <tr>
          <th>Unit</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody id="resultTable"></tbody>
    </table>
  </div>
</div>

<script>
// Speed of light (m/s)
const c = 299792458;

// AU in meters
const AU = 1.496e+11;

function convertLightSpeed() {
  let distance = parseFloat(document.getElementById("distanceInput").value);
  let unit = document.getElementById("unitSelect").value;

  if (!distance || distance <= 0) {
    alert("Enter a valid distance!");
    return;
  }

  // Convert input to meters
  let meters;

  switch(unit) {
    case "cm":
      meters = distance / 100;
      break;
    case "m":
      meters = distance;
      break;
    case "km":
      meters = distance * 1000;
      break;
    case "au":
      meters = distance * AU;
      break;
  }

  // Time = distance / speed
  let seconds = meters / c;

  let minutes = seconds / 60;
  let hours = minutes / 60;
  let days = hours / 24;
  let years = days / 365;

  let output = `
    <tr><td>Light Seconds</td><td>${seconds.toExponential(6)}</td></tr>
    <tr><td>Light Minutes</td><td>${minutes.toExponential(6)}</td></tr>
    <tr><td>Light Hours</td><td>${hours.toExponential(6)}</td></tr>
    <tr><td>Light Days</td><td>${days.toExponential(6)}</td></tr>
    <tr><td>Light Years</td><td>${years.toExponential(6)}</td></tr>
  `;

  document.getElementById("resultTable").innerHTML = output;
}
</script>
<footer class="text-center text-white bg-dark py-2 mt-4">
  © 2026 Sarath Prabhavu
</footer>
</body>
</html>
