<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <title>Blog | Sarath Prabhavu</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div id="navbar-placeholder"></div>

<!-- PAGE HEADER -->
<header class="bg-dark text-white text-center py-4">
  <div class="container">

    <p class="lead">Thoughts, Experiences, and Science Writing</p>
  </div>
</header>

<!-- BLOG SECTION -->
<section class="container my-5">

  <div class="row">

    <!-- BLOG POSTS -->
   <div class="col-lg-8" id="blog-posts"></div>



    </div>

  </div>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
  © 2026 Sarath Prabhavu
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts.js"></script>


<script>
fetch('posts.json')
  .then(response => response.json())
  .then(posts => {
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    const container = document.getElementById('blog-posts');


    posts.forEach((post, index) => {
      fetch(post.file)
        .then(res => res.text())
        .then(markdown => {

          const fullHTML = marked.parse(markdown);

          // Create preview (first few lines)
          const lines = markdown.split('\n');
          const previewText = lines.slice(0, 3).join('\n');
          const previewHTML = marked.parse(previewText);

          const postId = `post-${index}`;

          const postElement = document.createElement('div');
          postElement.className = 'card mb-4 shadow-sm';

          postElement.innerHTML = `
            <div class="card-body">
              <h3>${post.title}</h3>
              <p class="text-muted">${post.date} | ${post.category}</p>

              <!-- Preview -->
              <div id="${postId}-preview">
                ${previewHTML}
              </div>

              <!-- Full Content (hidden initially) -->
              <div id="${postId}-full" style="display:none;">
                ${fullHTML}
              </div>

              <!-- Read More Button -->
              <button class="btn btn-dark btn-sm mt-2" onclick="togglePost('${postId}')">
                Read More
              </button>
            </div>
          `;

          container.appendChild(postElement);
        });
    });
  });


// Toggle function
function togglePost(id) {
  const preview = document.getElementById(id + '-preview');
  const full = document.getElementById(id + '-full');
  const btn = event.target;

  if (full.style.display === "none") {
    preview.style.display = "none";
    full.style.display = "block";
    btn.innerText = "Show Less";
  } else {
    preview.style.display = "block";
    full.style.display = "none";
    btn.innerText = "Read More";
  }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>
</html>
